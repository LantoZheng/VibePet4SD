  <script>

// 发起 GET 请求获取数据
fetch('/GetDeviceInfo')
  .then(response => {
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    return response.json(); // 将响应数据解析为 JSON
  })
  .then(data => {
    // 在这里处理获取到的数据
	localStorage.clear();
	for (var key in data) {
		localStorage.setItem(key, JSON.stringify(data[key]));
		//console.log(key + ":" + data[key]);
	}
  })
  .catch(error => {
    console.error('Fetch error:', error);
  });
	
    function OnClick() {
		const _sendData = '/SetPage?Click';
        console.log(_sendData);
		httpget(_sendData);
    }
    function OnDoubleClick() {
		const _sendData = '/SetPage?DoubleClick';
        console.log(_sendData);
		httpget(_sendData);
    }
    function OnLongClick() {
		const _sendData = '/SetPage?LongClick';
        console.log(_sendData);
		httpget(_sendData);
    }
	function OnRestart() {
		const _sendData = '/SetRestart?Restart';
		//sendData(_sendData);
		httpget(_sendData);
	}
	function httpget(url) {
		var xhr = new XMLHttpRequest();
		xhr.open("GET", url, true);
		xhr.send();
	}
    function toggleFullScreen() {
        var elem = document.documentElement;  // 获取整个文档的元素

        if (!isFullScreen()) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();  // W3C 全屏标准
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();  // Firefox
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();  // Chrome 和 Safari
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();  // IE/Edge
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();  // W3C 全屏标准
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();  // Firefox
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();  // Chrome 和 Safari
            �␀␀␀} else if (document.msExitFullscreen) {
                document.msExitFullscreen();  // IE/Edge
            }
        }
    }

    function isFullScreen() {
        return (
            document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.mozFullScreenElement ||
            document.msFullscreenElement
        );
    }

    document.onfullscreenchange = document.onwebkitfullscreenchange = document.onmozfullscreenchange = function () {
        var fullScreenButton = document.getElementById('fullScreenButton');
        if (isFullScreen()) {
            fullScreenButton.textContent = '退出全屏';
        } else {
            fullScreenButton.textContent = '全屏';
        }
    };
  </script>
