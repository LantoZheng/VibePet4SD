    <style>
		.ambient-lighting{
		line-height: 2em; /* 设置行间距为2倍字体大小 */ 
		}
		.light-brightness {
		  display: flex; /* 设置为flex容器 */
		  align-items: center; /* 垂直居中 */
		}
		.lightvalue {
		  display: inline-block;
		  width: 30px; /* 设置固定宽度 */
		  text-align: center; /* 控制内容水平居中 */

  <body>
    <div class="block">
      <div class="card">
		  <a href="index.html"><img class="backButton" src="img/back.svg"></a>
		  <div>氛围灯设置</div>
	  </div>
      <div class="card">
        <div class="ambient-lighting">
          <div class="tips">支持一颗WS2812彩灯</div>
          <div class="switch-btn">
            <span>启用：</span>
            <label class="switch">
              <input type="checkbox" id="led-enable" onchange="sendGetRequest()" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="light-style" id="effect-select-wrapper">
            <span>样式：</span>
            <select id="led-style">
              <option value="1">1 固定色</option>
              <option value="2">2 呼吸灯</option>
              <option value="3">3 渐变色</option></select>
          </div>
          <div class="light-brightness" id="brightness-wrapper">
            <span>亮度：</span>
            <input type="range" id="led-brightness" min="1" max="255" value="128" step="1">
			<span id="lightvalue" class="lightvalue">128</span>
		  </div>
          <div class="light-color" id="color-wrapper">
            <span>颜色：</span>
            <input type="color" id="led-color" value="#ff0000"></div>
        </div>
      </div>
      <div class="card">
        <div class="btn-group">
          <button class="btn-preview" onclick="OnPreview()">预览</button>
          <button class="btn-save" onclick="OnSave()">保存</button></div>
      </div>
    </div>
    <div id="toast-container"></div>
  </body>
  <script>

	let brightness = document.getElementById("led-brightness");
	var style = document.getElementById("led-style");
	var color = document.getElementById("led-color");

	var checkbox = document.getElementById("led-enable");
	checkbox.checked = JSON.parse(localStorage.getItem('le'));

	style.value = JSON.parse(localStorage.getItem('ls'));
	
	let output = document.getElementById("lightvalue");
	let result = JSON.parse(localStorage.getItem('lb'));
	brightness.value = result;
	output.innerHTML = result;
	brightness.oninput = function() {
		output.innerHTML = this.value;
	};
	
	//#00ffff转变为65535
	function hexColorToDecimal(hexColor) {
	  var decimalValue = parseInt(hexColor.slice(1), 16); // 将十六进制字符串转换为十进制数值
	  return decimalValue; // 返回对应的十进制数值
	}
	//65535转变为#ffff00
	function decimalToHexColor(decimalValue) {
	  var hexValue = decimalValue.toString(16); // 将十进制转换为十六进制字符串
	  var paddedHexValue = hexValue.padStart(6, '0'); // 用 0 填充至六位
	  return '#' + paddedHexValue; // 返回带有 # 的十六进制颜色值
	}

	var hexcolor = decimalToHexColor(JSON.parse(localStorage.getItem('lc')));
	color.value = hexcolor;
	
  let enable = 0;
    function sendGetRequest() {
      checkbox = document.getElementById("led-enable");
      if (checkbox.checked) {
        enable = 1;
      } else {
        enable = 0;
      }
    }
	
	function OnPreview() {
		senddata(1);
	}
	function OnSave() {
		senddata(2);
	}

      let blue = parseInt(color.value.substring(5), 16);

	  let _sendData='/SetLedLight?Enable=' + enable + '&Brightness=' + brightness.value + '&Style=' + style.value + '&Color=' + hexColorToDecimal(color.value);
	  if(index==2)
	  {

		sendData(_sendData,1);
	  }
	  else if(index==1)

		sendData(_sendData,0);
	  }
	}
	</script>
