<!DOCTYPE html>
<html>

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1.0,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="format-detection" content="telephone=no" />
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>掌控小电视</title>
    <!-- <link rel="stylesheet" href="css/common.css"> -->
    <!-- <script src="js/zk.js"></script> -->
    <style>
* {
	margin:0;
	padding:0;
	overflow-x:hidden;
}
html,body {
	min-height:100vh;
	width:100%;
	display:flex;
	justify-content:center;
	/* align-items:center; */
    background-color:#ffdee9;
	background-image:linear-gradient(0deg,#ffdee9 0%,#b5fffc 100%);
	overflow: hidden;
}
button {
	width:100px;
	height:30px;
	padding-bottom:3px;
	border:none;
	border-radius:5px;
	color:#fff;
	background-color:#40c160;
	margin:5px;
}
button:active {
	background-color:#339b4c;
	color:white;
	/* 其他点击时样式 */
}
select {
	width:120px;
	height:24px;
}
input[type="text"], input[type="password"] {
width: 120px;
}
.block {
	width:90%;
	display:flex;
	flex-direction:column;
	/* justify-content:center; */
	align-items:center;
	height:100vh;
	margin: 10px 0px 10px 0px;
	line-height: 2em;
}
.card {
	width:500px;
	/* 修改为 90% */
	max-width:1000px;
	height:auto;
	padding:10px;
	display:flex;
	justify-content:center;
	align-items:center;
	flex-wrap:wrap;
	background:#ededed;
	border-radius:5px;
	box-shadow:0 0 10px rgba(0,0,0,0.2);
	margin:5px;
	flex-direction:column;
	overflow:hidden;
	position: relative;
}
@media screen and (max-width:500px) {
	.card {
	width:90%;
}
}
.backButton {
  position: absolute;
  left: 10px;
}
	</style>
  </head>
  
  <body>
    <div class="block">
      <div class="card">
		  <a href="index.html"><img class="backButton" src="img/back.svg"></a>
		  <div>WiFi设置</div>
	  </div>
      <div class="card">
        <div class="wifi-list">
          <label for="">WiFi列表：</label>
          <select id="wifi-list" onchange="document.getElementById('wifiname').value=this.value"></select>
        </div>
        <button onclick="getWifi()">获取WiFi列表</button>
		<div>获取列表需要5秒钟左右</div>
	  </div>
      <div class="card">
        <div class="wifi-input">
          <div class="wifi-name">
            <label for="">WiFi名称：</label>
            <input id="wifiname" type="text" /></div>
			<div class="wifi-pwd">
			  <label for="wifi-pwd">WiFi密码：</label>
			  <input id="wifipwd" type="text">
			</div>
        </div>
        <div class="save-btn">
          <button onclick="OnSave()">保存</button></div>
      </div>
    </div>
    <div id="toast-container"></div>
  </body>


<script>

/*[掌控]版权所有，盗版必究！*/
/*All rights reserved by ZhangKong Studio.*/

function getWifi() {
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
            var select = document.getElementById("wifi-list");
            //console.log(this.responseText);
            select.innerHTML = this.responseText;
            var responseData = JSON.parse(this.responseText);
            select.innerHTML = buildOptionsFromData(responseData.ssidList);
        }
    };
    xhr.open("GET", "/GetWiFiList", true);
    xhr.send();
}

function buildOptionsFromData(data) {
  var optionsHtml = "";
  for (var i = 0; i < data.length; i++) {
    optionsHtml += '<option value="' + data[i].ssid + '">' + data[i].ssid + '&nbsp;&nbsp;' + data[i].rssi + '</option>';
  }
  return optionsHtml;
}

function OnSave() {
	let wifiName = document.getElementById('wifiname').value;
	let wifiPwd = document.getElementById('wifipwd').value;
	if(wifiName == "" || wifiPwd == "") {
		//message("不能为空值！",2000);
		alert("不能为空值！");
		return;
	}
	const _sendData = '/SetWiFi?WiFiSSID='+wifiName+'&WiFiPSK='+wifiPwd;
	//sendData(_sendData);
    var xhr = new XMLHttpRequest();
    xhr.open("GET", _sendData, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState == 4 && xhr.status == 200) {
            //callback(xhr.responseText);
			alert("保存成功");
        }
		else {
			alert("错误:"+xhr.responseText);
		}
    }
    xhr.send();
}
</script>
</html>
