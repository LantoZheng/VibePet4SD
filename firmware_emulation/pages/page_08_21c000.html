    function OnSave() {
		const _sendData = '/SetPage?Value='+selectedValue+"&Save";
        console.log(_sendData);
		sendData(_sendData,1);
    }
	
	let selectedValue=0;
	let selectInput = document.getElementById('clock-type1');
    selectInput.value = JSON.parse(localStorage.getItem('sp'));
	selectInput.addEventListener('change', function() {
		const selectedOption = selectInput.options[selectInput.selectedIndex];
		selectedValue = selectedOption.value;
        const _sendData = '/SetPage?Value='+selectedValue;
		console.log(_sendData);
		sendData(_sendData,0);
	});
	let ten=JSON.parse(localStorage.getItem('pen'));
	console.log(ten.toString(16));
	controlDropdownOptions(ten);  // 传入十六进制值字符串
	function controlDropdownOptions(hexValue) {
	  let binaryString = hexValue.toString(2);//parseInt(hexValue, 16).toString(2); // 将十六进制转换为二进制字符串
	  binaryString = binaryString.padStart(11, '0'); // 左侧补零，使其长度为 11
	  console.log(binaryString);
	  let options = document.getElementById("clock-type1").getElementsByTagName("option");
	  for (let i = 0; i < options.length; i++) {
		if (i < binaryString.length && binaryString.charAt(binaryString.length - 1 - i) === '1') {
		  options[i].style.display = "block";  // 显示当前选项
		} else {
		  options[i].style.display = "none";   // 隐藏其它选项
		}
	  }
	}
